<svg width="104" height="84" viewBox="0 0 104 84" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="104" height="84" rx="10" fill="#E5E7EB"/>

  <!-- Column fills (dark → light) -->
  <!-- Left column (darkest) -->
  <rect x="2" y="2" width="33" height="80" fill="#1E3A8A" opacity="0.95"/>
  
  <!-- Middle column -->
  <rect x="35" y="2" width="35" height="80" fill="#3B5BCC" opacity="0.75"/>
  
  <!-- Right column (lightest) -->
  <rect x="70" y="2" width="32" height="80" fill="#93A5FF" opacity="0.45"/>

  <!-- Grid lines -->
  <g stroke="#1E3A8A" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- Outer border -->
    <rect x="2" y="2" width="100" height="80" rx="8"/>
    
    <!-- Vertical -->
    <line x1="35" y1="2" x2="35" y2="82"/>
    <line x1="70" y1="2" x2="70" y2="82"/>

    <!-- Horizontal -->
    <line x1="2" y1="20" x2="102" y2="20"/>
    <line x1="2" y1="40" x2="102" y2="40"/>
    <line x1="2" y1="60" x2="102" y2="60"/>
  </g>
</svg>
